name: Forge CI

on:
  push:
    branches: [main]

  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache FetchContent
        uses: actions/cache@v4
        with:
          path: .cache/fetchcontent
          key: ${{ runner.os }}-fetchcontent-${{ hashFiles('CMakeLists.txt', '**/CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-fetchcontent-

      - name: Configure CMake
        run: cmake -B build -DFETCHCONTENT_BASE_DIR=${{ github.workspace }}/.cache/fetchcontent

      - name: Build
        run: cmake --build build --parallel

      - name: Run Tests
        run: ctest --test-dir build --output-on-failure
